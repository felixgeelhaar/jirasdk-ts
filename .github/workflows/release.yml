name: Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@c5ba7f7862a0f64c1b1a05fbac13e0b8e86ba08c # v4

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Update npm for OIDC trusted publishing
        # npm >= 11.5.1 is required for trusted publishing (OIDC). Pin to the
        # 11.x line so we don't pull npm 12+, which requires a newer Node than
        # the one in .nvmrc (Node 20.x) and fails with EBADENGINE.
        run: npm install -g npm@^11.5.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          version: pnpm changeset version
          publish: pnpm changeset publish --access public --provenance
          commit: 'chore: release packages'
          title: 'chore: release packages'
        env:
          # No NPM_TOKEN / NODE_AUTH_TOKEN: publishing uses npm trusted
          # publishing (OIDC) via `id-token: write` + `--provenance`, which
          # mints a short-lived credential. A stale/empty NPM_TOKEN can break
          # OIDC auth detection, so it must be absent.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        if: steps.changesets.outputs.published == 'true'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const publishedPackages = JSON.parse('${{ steps.changesets.outputs.publishedPackages }}');

            for (const pkg of publishedPackages) {
              const tagName = `${pkg.name}@${pkg.version}`;
              const releaseName = `${pkg.name} v${pkg.version}`;

              try {
                await github.rest.repos.createRelease({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  tag_name: tagName,
                  name: releaseName,
                  body: `## ${releaseName}\n\nSee [CHANGELOG](https://github.com/${context.repo.owner}/${context.repo.repo}/blob/main/CHANGELOG.md) for details.`,
                  draft: false,
                  prerelease: pkg.version.includes('-'),
                });
                console.log(`Created release for ${tagName}`);
              } catch (error) {
                console.log(`Failed to create release for ${tagName}: ${error.message}`);
              }
            }

      - name: Verify Published Packages
        if: steps.changesets.outputs.published == 'true'
        run: |
          echo "Verifying published packages..."
          sleep 10  # Wait for npm registry to update
          PACKAGES='${{ steps.changesets.outputs.publishedPackages }}'
          echo "$PACKAGES" | jq -r '.[].name' | while read pkg; do
            VERSION=$(echo "$PACKAGES" | jq -r --arg name "$pkg" '.[] | select(.name == $name) | .version')
            echo "Checking $pkg@$VERSION..."
            npm view "$pkg@$VERSION" version || echo "Warning: $pkg@$VERSION not yet available on npm"
          done
