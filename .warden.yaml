# warden — local CI gate for jirasdk-ts (this repo never used husky/lint-staged,
# so warden is the sole hook manager). pre-commit stays fast (typecheck + format
# check); pre-push runs the FULL CI the GitHub workflow runs, so nothing leaves
# the machine that CI would reject. warden's native hooks live in .git/hooks and
# auto-fetch the binary if missing, so a fresh clone is gated without any npm
# devDependency.
extends: ''
agent: auto
hooks:
  pre_commit: true
  pre_push: true
commands:
  # Mapped to this package's real root scripts. Named 'eslint'/'testrun' (not
  # warden's built-in 'lint'/'test') so warden runs THESE exact scripts — CI
  # parity, not warden's own heuristics. `lint` here is real ESLint (eslint
  # src). Since the repo collapsed to a single package, typecheck and test no
  # longer need a prior build to resolve cross-package output; build stays in
  # pre_push only to catch bundler-level breakage before it reaches CI.
  typecheck: pnpm typecheck
  formatcheck: pnpm format:check
  eslint: pnpm lint
  testrun: pnpm test
  build: pnpm build
steps:
  # Fast gate on commit: types + formatting. Each step runs in an isolated
  # worktree (verify-only — warden never mutates your tree), so formatting is
  # CHECKED and blocked here, not auto-fixed. Run `pnpm format` to fix.
  pre_commit:
    - typecheck
    - formatcheck
  # Full CI parity on push, mirroring ci.yml (Lint / Type Check / Test / Build):
  # eslint, typecheck, format check, the test matrix's command, and the build. No npm-audit step — this fleet uses nox (nox-scan.yml) as the
  # single dependency/security source of truth, not npm audit.
  pre_push:
    - rebase
    - build
    - eslint
    - typecheck
    - formatcheck
    - testrun
timeouts: {}
cache: {}
agent_commands: {}
parallel: null
notify: null
risk:
  diff_lines_high: 400
  files_touched_high: 15
pr:
  enabled: false
  base: ''
  comment: null
rules: []
